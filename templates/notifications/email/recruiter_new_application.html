<!DOCTYPE html>
<html><body style="font-family:sans-serif;padding:20px;max-width:600px;margin:auto;">
<h2 style="color:#2563EB;">New Application Received</h2>
<p>Hi {{ recruiter.username }},</p>
<p>{{ message }}</p>
<table style="width:100%;border-collapse:collapse;margin:16px 0;">
  <tr><td style="padding:8px;background:#f1f5f9;"><strong>Candidate:</strong></td><td style="padding:8px;">{{ applicant.username }} ({{ applicant.email }})</td></tr>
  <tr><td style="padding:8px;background:#f1f5f9;"><strong>Job:</strong></td><td style="padding:8px;">{{ job.title }}</td></tr>
  <tr><td style="padding:8px;background:#f1f5f9;"><strong>Company:</strong></td><td style="padding:8px;">{{ job.company }}</td></tr>
</table>
<a href="#" style="display:inline-block;padding:10px 24px;background:#2563EB;color:#fff;text-decoration:none;border-radius:8px;">View Applications</a>
<p style="margin-top:24px;color:#64748b;font-size:12px;">SkillSync AI &mdash; Recruiter Dashboard</p>
</body></html>
