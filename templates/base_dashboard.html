{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563EB">
  <title>{% block title %}SkillSync AI{% endblock %}</title>

  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const theme = stored === 'dark' || stored === 'light'
        ? stored
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.add('theme-' + theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>

<body>
  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;"></div>

  {% if request.path != "/" %}
    {% include "includes/dashboard_nav.html" %}
  {% endif %}

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block scripts %}{% endblock %}

  <script>
    (function() {
      if (document.readyState === 'complete') {
        if (typeof initSidebarToggle === 'function') initSidebarToggle();
      } else {
        document.addEventListener('readystatechange', function() {
          if (document.readyState === 'complete' && typeof initSidebarToggle === 'function') initSidebarToggle();
        });
      }
    })();
  </script>
</body>
</html>
