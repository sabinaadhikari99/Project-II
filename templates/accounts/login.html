{% extends "base_auth.html" %}
{% load static %}

{% block title %}Login | SkillSync AI{% endblock %}

{% block content %}
<div class="split-auth">
  <div class="sa-panel">
    <div class="sa-card">
      <div class="sa-brand">
        <div class="sa-logo">S</div>
        <h1>Welcome back</h1>
        <p>Sign in to your SkillSync AI account</p>
      </div>

      <form id="loginForm">
        <div class="field-group">
          <label for="email"><i class="bi bi-envelope"></i> Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope field-icon"></i>
            <input id="email" class="form-control" name="email" type="email"
              autocomplete="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="field-group">
          <label for="password"><i class="bi bi-lock"></i> Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock field-icon"></i>
            <input id="password" class="form-control" name="password" type="password"
              autocomplete="current-password" placeholder="Enter your password" required>
            <button type="button" class="pw-toggle" tabindex="-1" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary btn-submit" type="submit">
          <i class="bi bi-box-arrow-in-right"></i> Sign in
        </button>

        <div id="message" class="mt-3"></div>

        <div class="auth-divider">or</div>

        <button type="button" class="btn btn-outline btn-linkedin" id="linkedinLoginBtn">
          <i class="bi bi-linkedin"></i> Continue with LinkedIn
        </button>

        <div class="auth-footer">
          <span>Don't have an account?</span>
          <a href="{% url 'register' %}">Create one</a>
        </div>

        <div class="trust-row">
          <span><i class="bi bi-lock-fill"></i> Encrypted</span>
          <span><i class="bi bi-patch-check-fill"></i> Secure</span>
          <span><i class="bi bi-lightning-charge-fill"></i> Fast</span>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<style>
  .split-auth .field-group { margin-bottom: 1.25rem; }
  .split-auth .field-group label {
    display: flex; align-items: center; gap: 0.3rem;
    font-size: 0.8125rem; font-weight: 600;
    color: var(--ss-text); margin-bottom: 0.375rem;
  }
  .split-auth .field-group label i { font-size: 0.75rem; color: var(--ss-muted); }
  .split-auth .input-wrap { position: relative; }
  .split-auth .input-wrap .field-icon {
    position: absolute; left: 0.875rem; top: 50%;
    transform: translateY(-50%); font-size: 0.9375rem;
    color: var(--ss-muted-light); pointer-events: none;
    transition: color var(--ss-transition-fast); z-index: 2;
  }
  .split-auth .input-wrap:focus-within .field-icon { color: var(--ss-brand); }
  .split-auth .form-control {
    height: 44px; border-radius: var(--ss-radius);
    padding: 0 1rem 0 2.5rem;
    border: 1.5px solid var(--ss-border);
    background: var(--ss-surface); font-size: 0.875rem;
    transition: all var(--ss-transition-fast);
    color: var(--ss-text);
  }
  .split-auth .form-control::placeholder { color: var(--ss-muted-light); }
  .split-auth .form-control:hover { border-color: var(--ss-border-strong); }
  .split-auth .form-control:focus {
    border-color: var(--ss-brand);
    box-shadow: 0 0 0 3px rgba(var(--ss-brand-rgb), 0.10);
    outline: none;
  }
  .split-auth .pw-toggle {
    position: absolute; right: 0.75rem; top: 50%;
    transform: translateY(-50%); background: none; border: none;
    padding: 0.25rem; font-size: 1rem;
    color: var(--ss-muted-light); cursor: pointer;
    border-radius: var(--ss-radius-sm);
    transition: all var(--ss-transition-fast); z-index: 2;
  }
  .split-auth .pw-toggle:hover {
    color: var(--ss-brand); background: var(--ss-brand-soft);
  }
  .split-auth .btn-submit {
    width: 100%; height: 44px;
    border-radius: 22px;
    font-weight: 700; font-size: 0.875rem; margin-top: 0.5rem;
  }
  .split-auth .auth-divider {
    display: flex; align-items: center; gap: 1rem;
    margin: 1.25rem 0; font-size: 0.75rem; font-weight: 600;
    color: var(--ss-muted-light);
  }
  .split-auth .auth-divider::before,
  .split-auth .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--ss-border);
  }
  .split-auth .auth-footer {
    text-align: center; font-size: 0.875rem; color: var(--ss-muted);
  }
  .split-auth .auth-footer a { font-weight: 700; }
  .split-auth .trust-row {
    display: flex; justify-content: center; gap: 1.5rem;
    margin-top: 1.25rem; padding-top: 1rem;
    border-top: 1px solid var(--ss-border);
  }
  .split-auth .trust-row span {
    display: flex; align-items: center; gap: 0.3rem;
    font-size: 0.6875rem; font-weight: 600; color: var(--ss-muted-light);
  }
  .split-auth .trust-row i { font-size: 0.75rem; color: var(--ss-brand); }
  #message:not(:empty) {
    padding: 0.75rem 1rem; border-radius: var(--ss-radius);
    font-weight: 600; font-size: 0.8125rem; margin-top: 0.75rem;
  }
  .btn-linkedin {
    width: 100%; height: 44px; border-radius: 22px;
    font-weight: 700; font-size: 0.875rem;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    border: 1.5px solid var(--ss-border) !important;
    background: var(--ss-surface) !important; color: var(--ss-text) !important;
    transition: all var(--ss-transition-fast);
  }
  .btn-linkedin:hover {
    border-color: #0a66c2 !important;
    color: #0a66c2 !important;
    background: rgba(10,102,194,0.04) !important;
  }
  .btn-linkedin i { font-size: 1.125rem; color: #0a66c2; }
</style>
<script>
  (function() {
    document.querySelector('.pw-toggle')?.addEventListener('click', function() {
      const inp = document.getElementById('password');
      const ico = this.querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        ico.className = 'bi bi-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const btn = event.target.querySelector('.btn-submit');
      const orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing in\u2026';
      btn.disabled = true;
      const data = Object.fromEntries(new FormData(event.target));
      try {
        const result = await api('/api/auth/login/', { method: 'POST', body: JSON.stringify(data) }, false);
        saveSession(result);
        routeByRole(result.user.role);
      } catch (error) {
        btn.innerHTML = orig;
        btn.disabled = false;
        showMessage(error.message, 'danger');
      }
    });

    document.getElementById('linkedinLoginBtn').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Redirecting\u2026';
      try {
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        const url = role ? '/api/auth/linkedin/login/?role=' + encodeURIComponent(role) : '/api/auth/linkedin/login/';
        const resp = await fetch(url);
        const data = await resp.json();
        window.location.href = data.auth_url;
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-linkedin"></i> Continue with LinkedIn';
        showMessage('Failed to connect to LinkedIn. Please try again.', 'danger');
      }
    });
  })();
</script>
{% endblock %}
